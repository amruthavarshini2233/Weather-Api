<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>

<body>

<div id="particles-js"></div>

<div class="weather-card">

<h2>Weather Dashboard</h2>

<div class="search-box">

<input type="text"
id="cityInput"
placeholder="Search location">

<button onclick="getWeather()">Search</button>

</div>

<div id="suggestions" class="suggestions"></div>

<button class="location-btn" onclick="getLocationWeather()">
📍 Use My Location
</button>

<div class="weather-info">

<div class="city">--</div>

<img class="weather-icon" style="display:none">

<div class="temp">--°C</div>

<div class="desc">Search city or detect location</div>

<div class="details">

<div class="detail-box">
<div class="label">Humidity</div>
<div class="value" id="humidity">--%</div>
</div>

<div class="detail-box">
<div class="label">Wind</div>
<div class="value" id="wind">-- km/h</div>
</div>

<div class="detail-box">
<div class="label">Feels Like</div>
<div class="value" id="feels">--°C</div>
</div>

<div class="detail-box">
<div class="label">Pressure</div>
<div class="value" id="pressure">-- mb</div>
</div>

<div class="detail-box">
<div class="label">UV Index</div>
<div class="value" id="uv">--</div>
</div>

<div class="detail-box">
<div class="label">Cloud</div>
<div class="value" id="cloud">--%</div>
</div>

</div>

<div id="updateTime" class="update"></div>

</div>

<div id="map"></div>

</div>

<script src="script.js"></script>

</body>
</html>
